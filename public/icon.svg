<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- FretPath app icon — 1024x1024 source -->

  <defs>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#1a1612"/>

  <!-- Guitar neck -->
  <rect x="362" y="80" width="300" height="864" rx="16" fill="#2c2118"/>

  <!-- Nut -->
  <rect x="362" y="200" width="300" height="22" fill="#5c4a32"/>

  <!-- Fret lines -->
  <line x1="362" y1="340" x2="662" y2="340" stroke="#8a7355" stroke-width="6" fill="none"/>
  <line x1="362" y1="468" x2="662" y2="468" stroke="#8a7355" stroke-width="5" fill="none"/>
  <line x1="362" y1="584" x2="662" y2="584" stroke="#8a7355" stroke-width="5" fill="none"/>
  <line x1="362" y1="690" x2="662" y2="690" stroke="#8a7355" stroke-width="5" fill="none"/>
  <line x1="362" y1="786" x2="662" y2="786" stroke="#8a7355" stroke-width="5" fill="none"/>
  <line x1="362" y1="872" x2="662" y2="872" stroke="#8a7355" stroke-width="5" fill="none"/>

  <!-- Strings (6 strings, thin on left = high e, thick on right = low E) -->
  <line x1="395" y1="200" x2="395" y2="944" stroke="#d4c8b0" stroke-width="2.5" fill="none" opacity="0.65"/>
  <line x1="435" y1="200" x2="435" y2="944" stroke="#d4c8b0" stroke-width="3.5" fill="none" opacity="0.62"/>
  <line x1="475" y1="200" x2="475" y2="944" stroke="#d4c8b0" stroke-width="4.5" fill="none" opacity="0.58"/>
  <line x1="515" y1="200" x2="515" y2="944" stroke="#d4c8b0" stroke-width="5.5" fill="none" opacity="0.54"/>
  <line x1="575" y1="200" x2="575" y2="944" stroke="#d4c8b0" stroke-width="7" fill="none" opacity="0.48"/>
  <line x1="635" y1="200" x2="635" y2="944" stroke="#d4c8b0" stroke-width="9" fill="none" opacity="0.40"/>

  <!-- Fret inlay dots -->
  <circle cx="512" cy="528" r="14" fill="#3a2e22"/>
  <circle cx="512" cy="738" r="14" fill="#3a2e22"/>

  <!-- Path trail (dashed connector) -->
  <polyline
    points="635,738 575,638 515,528 475,404 435,404 395,270"
    stroke="#f5a623" stroke-width="4" fill="none" opacity="0.4"
    stroke-dasharray="12 8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trail dots — fading toward bottom -->
  <circle cx="635" cy="738" r="22" fill="#f5a623" opacity="0.10"/>
  <circle cx="575" cy="638" r="24" fill="#f5a623" opacity="0.14"/>
  <circle cx="515" cy="528" r="28" fill="#f5a623" opacity="0.20"/>
  <circle cx="475" cy="404" r="32" fill="#f5a623" opacity="0.26"/>
  <circle cx="435" cy="404" r="34" fill="#f5a623" opacity="0.30"/>

  <!-- Solid trail dots -->
  <circle cx="635" cy="738" r="14" fill="#f5a623" opacity="0.30"/>
  <circle cx="575" cy="638" r="16" fill="#f5a623" opacity="0.40"/>
  <circle cx="515" cy="528" r="18" fill="#f5a623" opacity="0.55"/>
  <circle cx="475" cy="404" r="20" fill="#f5a623" opacity="0.70"/>
  <circle cx="435" cy="404" r="20" fill="#f5a623" opacity="0.80"/>

  <!-- Main glowing dot (current position on the path) -->
  <circle cx="395" cy="270" r="52" fill="#f5a623" opacity="0.12"/>
  <circle cx="395" cy="270" r="36" fill="#f5a623" opacity="0.30"/>
  <circle cx="395" cy="270" r="22" fill="#f5a623"/>
  <circle cx="395" cy="270" r="8" fill="#ffffff" opacity="0.95"/>
</svg>
